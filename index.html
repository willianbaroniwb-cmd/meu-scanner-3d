<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo para Scanner 3D</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        .glow-box { box-shadow: 0 0 40px rgba(99, 102, 241, 0.15), 0 0 80px rgba(99, 102, 241, 0.05); }
        .upload-zone { border: 2px dashed #475569; transition: all 0.3s ease; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #818cf8; background: rgba(99, 102, 241, 0.05); transform: scale(1.01); }
        .spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .progress-bar-fill { background: linear-gradient(90deg, #6366f1, #8b5cf6, #a855f7); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .float-animation { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="h-full gradient-bg overflow-auto text-slate-200">
    <div class="min-h-full w-full px-4 py-8 md:py-12">
        <div class="max-w-2xl mx-auto">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-4 float-animation">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
                    </svg>
                </div>
                <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">📸 Scanner 3D Real</h1>
                <p class="text-slate-400 text-lg">Transforme vídeos em arquivos prontos para impressão 3D.</p>
            </div>

            <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-6 md:p-8 glow-box">
                <div id="upload-zone" class="upload-zone rounded-2xl p-8 md:p-12 text-center cursor-pointer">
                    <input type="file" id="video-input" accept="video/*" class="hidden">
                    <div id="upload-content">
                        <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-slate-700/50 flex items-center justify-center">
                            <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115 9h1a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                        </div>
                        <h3 class="text-white font-semibold text-lg mb-2">Selecione seu vídeo 360°</h3>
                        <p class="text-slate-400 mb-4">Clique ou arraste o arquivo aqui</p>
                        <span class="px-4 py-2 bg-slate-700/50 rounded-full text-xs text-slate-300">MP4, MOV • Recomendado 30-60s</span>
                    </div>
                </div>

                <div id="video-preview" class="hidden mb-6">
                    <div class="relative rounded-2xl overflow-hidden bg-slate-900 border border-slate-700">
                        <video id="preview-video" class="w-full max-h-64 object-contain" controls></video>
                        <button id="remove-video" class="absolute top-3 right-3 w-8 h-8 bg-red-500/80 hover:bg-red-500 rounded-full flex items-center justify-center">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                    <p id="file-name" class="text-indigo-400 text-sm mt-3 text-center font-medium"></p>
                </div>

                <button id="generate-btn" class="w-full mt-6 py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold rounded-xl transition-all hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2" disabled>
                    <span>Gerar Modelo 3D</span>
                </button>

                <div id="processing-state" class="hidden mt-8 border-t border-slate-700 pt-6">
                    <div class="flex items-center justify-center mb-6">
                        <div class="relative">
                            <div class="w-16 h-16 rounded-full border-4 border-indigo-500/20"></div>
                            <div class="absolute inset-0 w-16 h-16 rounded-full border-4 border-transparent border-t-indigo-500 spin-slow"></div>
                        </div>
                    </div>
                    <h3 id="proc-title" class="text-center font-semibold text-white mb-2">Enviando para Nuvem...</h3>
                    <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar-fill h-full w-0 transition-all duration-500"></div>
                    </div>
                    <p id="progress-text" class="text-center text-xs text-slate-500 mt-2">0%</p>
                </div>

                <div id="success-state" class="hidden mt-8 text-center">
                    <div class="bg-emerald-500/20 border border-emerald-500/50 rounded-2xl p-6">
                        <h3 class="text-emerald-400 font-bold text-lg mb-4">✅ Modelo Pronto para Impressão!</h3>
                        <button id="download-btn" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl flex items-center justify-center gap-2">
                            📥 Baixar Arquivo .STL
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "kiri_OTiI_Lhf_AS9SuCkQBlXkmNIKnL1cRukOAuhGJ2g560";
        let selectedFile = null;

        // Elementos
        const videoInput = document.getElementById('video-input');
        const uploadZone = document.getElementById('upload-zone');
        const generateBtn = document.getElementById('generate-btn');
        const videoPreview = document.getElementById('video-preview');
        const successState = document.getElementById('success-state');
        const processingState = document.getElementById('processing-state');

        uploadZone.onclick = () => videoInput.click();

        videoInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                document.getElementById('preview-video').src = URL.createObjectURL(selectedFile);
                document.getElementById('file-name').textContent = selectedFile.name;
                uploadZone.classList.add('hidden');
                videoPreview.classList.remove('hidden');
                generateBtn.disabled = false;
            }
        };

        document.getElementById('remove-video').onclick = () => {
            location.reload(); // Forma simples de resetar
        };

        generateBtn.onclick = async () => {
            generateBtn.disabled = true;
            processingState.classList.remove('hidden');
            
            // Simulação de Progresso com a API
            updateProgress(20, "Enviando vídeo...");
            
            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                // Exemplo de integração (Endpoints variam conforme documentação da KIRI)
                // const response = await fetch('https://api.kiriengine.app/v1/upload', {
                //     method: 'POST',
                //     headers: {'Authorization': `Bearer ${API_KEY}`},
                //     body: formData
                // });
                
                // Simulação de etapas reais
                setTimeout(() => updateProgress(50, "Processando Nuvem de Pontos..."), 2000);
                setTimeout(() => updateProgress(80, "Gerando Malha STL..."), 5000);
                setTimeout(() => {
                    updateProgress(100, "Concluído!");
                    processingState.classList.add('hidden');
                    successState.classList.remove('hidden');
                }, 8000);

            } catch (err) {
                alert("Erro ao conectar com a KIRI Engine.");
            }
        };

        function updateProgress(val, text) {
            document.getElementById('progress-bar').style.width = val + '%';
            document.getElementById('progress-text').textContent = val + '%';
            document.getElementById('proc-title').textContent = text;
        }

        document.getElementById('download-btn').onclick = () => {
            alert("O download começaria aqui se o processamento fosse real!");
        };
    </script>
</body>
</html>
